name: Lint and Type-check

on:
  push:
    branches:
      - beta
  pull_request:
    branches:
      - master
      - beta
      - develop
      - dev
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lint
        run: npm run lint

      - name: Run Type-check
        run: npm run check
