name: Build (Android)

on:
  push:
    tags:
      - 'build-*'
      - 'release-*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Get branch info
        id: branch
        run: |
          BRANCH=$(git for-each-ref --format='%(refname:short)' --points-at HEAD 'refs/remotes/origin/*' | head -n 1 | sed 's/^origin\///')
          if [ -z "$BRANCH" ]; then
            BRANCH="unknown"
          fi
          COMMIT=$(git rev-parse --short HEAD)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Check signing key
        id: signing
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "has_signing_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_signing_key=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Changelog
        id: changelog
        run: |
          git fetch --tags --force
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --oneline --format='- %s' | head -30)
          else
            CHANGELOG=$(git log "$LAST_TAG..HEAD" --oneline --format='- %s' | head -30)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/ndk
          key: ndk-r27-${{ runner.os }}

      - name: Setup Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Set NDK path (cached)
        if: steps.cache-ndk.outputs.cache-hit == 'true'
        run: echo "NDK_PATH=/usr/local/lib/android/ndk/r27" >> $GITHUB_ENV

      - name: Set NDK path (fresh install)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: echo "NDK_PATH=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Cache Cargo registry and index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.NDK_PATH }}
          ANDROID_NDK_HOME: ${{ env.NDK_PATH }}
        run: npx tauri android build

      - name: Decode keystore
        if: steps.signing.outputs.has_signing_key == 'true'
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > aventura-release.keystore

      - name: Sign APK
        if: steps.signing.outputs.has_signing_key == 'true'
        id: sign
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          TAG="${{ github.ref_name }}"
          APK_NAME="aventuras-${BRANCH}-${TAG}.apk"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks aventura-release.keystore \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --out "$APK_NAME" \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
          echo "APK_NAME=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Rename APK (unsigned)
        if: steps.signing.outputs.has_signing_key != 'true'
        id: rename
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          TAG="${{ github.ref_name }}"
          APK_NAME="aventuras-${BRANCH}-${TAG}.apk"
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ startsWith(github.ref_name, 'build-') }}
          files: |
            ${{ steps.sign.outputs.APK_NAME || steps.rename.outputs.APK_NAME }}
          body: |
            ## 📦 ${{ startsWith(github.ref_name, 'build-') && 'Build' || '更新内容 (What\'s New)' }} ${{ github.ref_name }}

            ---

            ${{ steps.changelog.outputs.changelog }}

            ---

            ## 📥 下载说明 (Download)

            请在 **Assets** 中下载 APK 文件进行安装。

            Download the APK file from the **Assets** section below.

            ### 版本信息 (Version Info)
            - 版本号 / Version: ${{ steps.version.outputs.VERSION }}
            - 分支 / Branch: ${{ steps.branch.outputs.branch }}
            - 提交 / Commit: ${{ steps.branch.outputs.commit }}
            - Tag: ${{ github.ref_name }}
            - 构建时间 / Build Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
